name: Update Algolia Index

on:
  workflow_dispatch:  # 仅手动触发，避免自动触发
    inputs:
      reason:
        description: '更新原因'
        required: false
        default: '手动更新搜索索引'

jobs:
  algolia-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Update Algolia index
        run: |
          npx hexo clean
          npm run build
          npx hexo algolia
        env:
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY || secrets.ALGOLIA_ADMIN_API_KEY }}