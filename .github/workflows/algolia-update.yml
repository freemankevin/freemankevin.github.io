name: Update Algolia Index

on:
  push:
    branches:
      - main
    paths:
      # 仅当以下关键文件变更时触发
      - 'source/_posts/**.md'
  workflow_dispatch:  # 同时支持手动触发

jobs:
  algolia-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Update Algolia index
        run: |
          npx hexo clean
          npm run build
          npx hexo algolia
        env:
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY || secrets.ALGOLIA_ADMIN_API_KEY }}