name: Update Algolia Index

on:
  push:
    branches:
      - main
    paths:
      - 'source/_posts/**'
      - '_config.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  algolia-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'  # Node 16 兼容性更好，避免 ESM 问题
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci  # 使用 package-lock.json 锁定版本，避免依赖冲突
        
      - name: Update Algolia index
        run: |
          # 使用 npm run 执行 hexo 命令（本地安装的依赖）
          npm run clean
          npm run generate
          # 使用 npx 执行 hexo algolia（本地安装的插件）
          npx hexo algolia
        env:
          # 使用 Write API Key（推荐）或 Admin API Key（备用）
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY || secrets.ALGOLIA_ADMIN_API_KEY }}