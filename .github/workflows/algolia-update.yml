name: Update Algolia Index

on:
  push:
    branches:
      - main
    paths:
      - 'source/_posts/**'
      - '_config.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  algolia-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Update Algolia index
        run: |
          # 使用 Write API Key 更新索引（安全权限，仅限写入）
          # 创建方法：Algolia Dashboard -> Settings -> API Keys -> Create API Key
          # ACL: addObject, deleteObject, listIndexes, editSettings
          export HEXO_ALGOLIA_INDEXING_KEY="${{ secrets.ALGOLIA_WRITE_API_KEY }}"
          hexo clean
          hexo generate
          hexo algolia
        env:
          # 可选：使用 Admin API Key（完全权限，风险较高）
          # 建议优先使用 Write API Key
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY || secrets.ALGOLIA_ADMIN_API_KEY }}