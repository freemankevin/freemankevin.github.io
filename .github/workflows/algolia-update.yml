name: Update Algolia Index

on:
  push:
    branches:
      - main
    paths:
      - 'source/_posts/**'
      - '_config.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  algolia-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Update Algolia index
        run: |
          # 使用环境变量替换配置中的 API Key
          export ALGOLIA_API_KEY="${{ secrets.ALGOLIA_ADMIN_API_KEY }}"
          hexo clean
          hexo generate
          hexo algolia
        env:
          HEXO_ALGOLIA_INDEXING_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}